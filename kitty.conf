# WARNING:
# I changed the default kitty modifier key.
# Currently it is set to Ctrl+Super.
# 
# If you prefer something els from the default Ctrl+Shift:
# 1. Comment out the line below (add a # in front of it)
kitty_mod ctrl+shift

# 2. Uncomment the line below  (Ctrl+Shift)
# kitty_mod ctrl+super

tab_bar_edge bottom
tab_bar_min_tabs 1
tab_title_template 😸{title}


hide_window_decorations no
tab_bar_style custom
tab_bar_min_tabs 1

allow_remote_control yes

show_hyperlink_targets yes
underline_hyperlinks hover
copy_on_select yes
enable_audio_bell no
bell_on_tab "🔔 "
map kitty_mod+escape kitty_shell window

font_family     FiraCode Nerd Font Mono
font_size       14.0
enabled_layouts Tall, *
window_margin_width     10

window_border_width     1pt
active_border_color     #44ffff

# Fix backspace behavior in SSH sessions
# Ensure Backspace works correctly on remote systems (SSH / network devices)
map backspace send_text all \x7f


# Use a widely compatible terminal type for SSH sessions.
# Some remote systems and network devices behave incorrectly with xterm-kitty.
term xterm-256color


include open-actions.conf
include current-theme.conf

# I use a GPG agent SSH socket
#env SSH_AUTH_SOCK=/run/user/1000/gnupg/S.gpg-agent.ssh
